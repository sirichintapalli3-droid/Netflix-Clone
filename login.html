<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: rgba(0,0,0,0.7);" class="bg">
  <div class="center">
    <h2>User Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
    </form>
    <p>New user? <a href="#" id="signupLink">Sign up</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
